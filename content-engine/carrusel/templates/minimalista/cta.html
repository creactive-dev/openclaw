<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1350px; overflow: hidden; background: #0C0C0C; }
    .slide { width: 1080px; height: 1350px; background: #0C0C0C; font-family: 'Plus Jakarta Sans', sans-serif; position: relative; overflow: hidden; }

    .glow-bottom { position: absolute; bottom: -100px; left: 50%; transform: translateX(-50%); width: 1080px; height: 700px; background: radial-gradient(ellipse, rgba(255,50,49,0.20) 0%, rgba(255,50,49,0.07) 45%, transparent 70%); pointer-events: none; }
    .glow-top { position: absolute; top: -80px; right: -80px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,180,216,0.09) 0%, transparent 65%); pointer-events: none; }
    .dot-grid { position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.07) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%); -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%); }

    /* Progress bar */
    .progress-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.07); z-index: 20; }
    .progress-fill { height: 100%; width: {{progress_pct}}%; background: linear-gradient(90deg, #FF3231, rgba(255,50,49,0.4)); border-radius: 0 2px 2px 0; }

    /* Content */
    .content { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; padding: 120px 68px 100px; z-index: 10; }
    .label { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.30); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }
    .headline { font-size: 68px; font-weight: 800; color: #ffffff; line-height: 0.95; letter-spacing: -2.5px; margin-bottom: 56px; }
    .headline .accent { color: #FF3231; }

    .cta-btn { display: inline-flex; align-self: flex-start; align-items: center; gap: 16px; background: #FF3231; padding: 22px 44px; border-radius: 100px; margin-bottom: 44px; box-shadow: 0 0 60px rgba(255,50,49,0.38), 0 0 120px rgba(255,50,49,0.16); }
    .cta-btn-text { font-size: 22px; font-weight: 700; color: #ffffff; letter-spacing: -0.5px; }
    .cta-arrow { width: 32px; height: 32px; background: rgba(255,255,255,0.22); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #ffffff; }
    .nota { font-size: 18px; font-weight: 400; color: rgba(255,255,255,0.30); line-height: 1.55; max-width: 680px; }

    /* Footer */
    .footer { position: absolute; bottom: 44px; left: 68px; right: 68px; display: flex; align-items: center; justify-content: space-between; z-index: 10; }
    .handle { font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.45); letter-spacing: -0.3px; }
    .logo-img { height: 22px; width: auto; display: block; opacity: 0.32; }
    .logo-text { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.28); display: none; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="glow-bottom"></div><div class="glow-top"></div><div class="dot-grid"></div>
    <div class="content">
      <div class="label">Próximo paso</div>
      <div class="headline">{{headline_html}}</div>
      <div class="cta-btn"><div class="cta-btn-text">{{cta}}</div><div class="cta-arrow">→</div></div>
      {{nota_html}}
    </div>
    <div class="footer">
      <div class="handle">@oscarvergarabarros</div>
      <img class="logo-img" src="../../public/brand/logo.png" alt="CreActive Studio" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <div class="logo-text">CreActive Studio</div>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>
</body>
</html>
