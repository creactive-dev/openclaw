<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:ital,wght@0,400;0,700;0,900&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #111111;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      background: #111111;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Cian glow bottom-left */
    .slide::after {
      content: '';
      position: absolute;
      bottom: -100px;
      left: -80px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(57, 179, 197, 0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    /* ── Header ── */
    .header {
      position: absolute;
      top: 60px;
      left: 80px;
      right: 80px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .brand-asterisk {
      font-family: 'Inter', sans-serif;
      font-size: 52px;
      font-weight: 900;
      color: #ff3130;
      line-height: 1;
      letter-spacing: -3px;
    }

    .slide-num {
      font-size: 14px;
      font-weight: 400;
      color: #3a3a3a;
      letter-spacing: 1px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 6px;
      padding: 4px 10px;
    }

    /* ── Content ── */
    .content {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 160px 80px;
    }

    .etiqueta {
      display: inline-flex;
      align-self: flex-start;
      font-size: 12px;
      font-weight: 700;
      color: #39b3c5;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: rgba(57, 179, 197, 0.10);
      border: 1px solid rgba(57, 179, 197, 0.30);
      border-radius: 50px;
      padding: 7px 18px;
      margin-bottom: 36px;
    }

    /* Cian line above headline */
    .cian-line {
      width: 56px;
      height: 4px;
      background: #39b3c5;
      border-radius: 2px;
      margin-bottom: 28px;
    }

    .headline {
      font-family: 'Inter', sans-serif;
      font-size: 100px;
      font-weight: 900;
      color: #ffffff;
      line-height: 0.95;
      letter-spacing: -4px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .headline .accent { color: #ff3130; }

    .subheadline {
      font-size: 26px;
      font-weight: 400;
      color: #555555;
      line-height: 1.65;
      max-width: 800px;
    }

    /* ── Footer ── */
    .footer {
      position: absolute;
      bottom: 50px;
      left: 80px;
      right: 80px;
      display: flex;
      align-items: center;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      padding-top: 20px;
    }

    .logo-img   { height: 28px; width: auto; display: block; }
    .brand-text { font-size: 20px; font-weight: 400; color: #39b3c5; letter-spacing: -0.2px; display: none; }
  </style>
</head>
<body>
  <div class="slide">

    <div class="header">
      <div class="brand-asterisk">*</div>
      <div class="slide-num">{{slide_num}}</div>
    </div>

    <div class="content">
      {{etiqueta_html}}
      <div class="cian-line"></div>
      <div class="headline">{{headline_html}}</div>
      {{subheadline_html}}
    </div>

    <div class="footer">
      <img class="logo-img" src="../public/brand/logo.png" alt="CreActive Studio"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <div class="brand-text">CreActive Studio</div>
    </div>

  </div>
</body>
</html>
