<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1350px; overflow: hidden; background: #F8FAFC; }
    .slide { width: 1080px; height: 1350px; background: #F8FAFC; font-family: 'Plus Jakarta Sans', sans-serif; position: relative; overflow: hidden; }

    /* Grid texture */
    .grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; }

    /* Corner accent */
    .corner-accent { position: absolute; top: -60px; right: -60px; width: 340px; height: 340px; background: radial-gradient(circle, rgba(255,50,49,0.07) 0%, transparent 65%); pointer-events: none; }

    /* Circuit detail — versión light */
    .circuit-tr { position: absolute; top: 90px; right: 68px; width: 80px; height: 80px; border-top: 1px solid rgba(255,50,49,0.22); border-right: 1px solid rgba(255,50,49,0.22); border-radius: 0 6px 0 0; pointer-events: none; }
    .circuit-tr::after { content: ''; position: absolute; top: -3px; right: -3px; width: 6px; height: 6px; border-radius: 50%; background: rgba(255,50,49,0.50); }

    /* Header */
    .header    { position: absolute; top: 52px; left: 68px; right: 68px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .etiqueta  { font-size: 14px; font-weight: 700; color: #FF3231; letter-spacing: 2.5px; text-transform: uppercase; }
    .slide-num { font-size: 14px; font-weight: 400; color: rgba(15,23,42,0.30); letter-spacing: 1.5px; }

    /* Progress bar */
    .progress-bar  { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(15,23,42,0.08); z-index: 20; }
    .progress-fill { height: 100%; width: {{progress_pct}}%; background: linear-gradient(90deg, #FF3231, rgba(255,50,49,0.3)); border-radius: 0 2px 2px 0; }

    /* Content — flujo natural */
    .content { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; padding: 130px 68px 100px; z-index: 10; }

    .headline { font-size: 48px; font-weight: 800; color: #0F172A; line-height: 1.05; letter-spacing: -1.5px; margin-bottom: 28px; }
    .headline .accent { color: #FF3231; }

    /* Analysis */
    .analysis { font-size: 22px; font-weight: 400; color: #475569; line-height: 1.65; margin-bottom: 24px; padding: 18px 24px; border-left: 3px solid rgba(255,50,49,0.60); background: rgba(255,50,49,0.04); border-radius: 0 10px 10px 0; }

    /* Card bullets — light style */
    .bullets { display: flex; flex-direction: column; gap: 12px; }
    .bullet { display: flex; align-items: center; gap: 22px; background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 16px; padding: 20px 26px; position: relative; overflow: hidden; box-shadow: 0 2px 8px rgba(15,23,42,0.06); }
    .bullet::before { content: ''; position: absolute; left: 0; top: 16px; bottom: 16px; width: 3px; background: linear-gradient(180deg, rgba(255,50,49,0.8), rgba(255,50,49,0)); border-radius: 0 2px 2px 0; }
    .bullet-icon { flex-shrink: 0; width: 38px; height: 38px; background: #FF3231; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #ffffff; }
    .bullet-text { font-size: 22px; font-weight: 400; color: #334155; line-height: 1.35; }
    .bullet-text strong { color: #0F172A; font-weight: 700; }

    /* Footer */
    .footer { position: absolute; bottom: 44px; left: 68px; right: 68px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #E2E8F0; padding-top: 18px; z-index: 10; }
    .handle { font-size: 20px; font-weight: 700; color: rgba(15,23,42,0.50); }
    .brand  { font-size: 18px; font-weight: 700; color: rgba(15,23,42,0.40); }
    .logo-img { height: 20px; width: auto; display: block; opacity: 0.40; }
    .logo-text { display: none; }

    /* ── MOCKUPS — posición inline, ancho completo ────────────────────────── */
    .mockup { width: 100%; margin-bottom: 20px; }

    /* Dashboard horizontal — light */
    .mockup-dashboard { display: flex; align-items: stretch; background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 16px; overflow: hidden; height: 150px; box-shadow: 0 2px 8px rgba(15,23,42,0.06); }
    .md-sidebar { flex: 0 0 170px; padding: 16px 20px; border-right: 1px solid #F1F5F9; display: flex; flex-direction: column; justify-content: space-between; }
    .md-dots    { display: flex; gap: 6px; }
    .md-dot     { width: 8px; height: 8px; border-radius: 50%; }
    .md-dot.red   { background: rgba(255,59,48,0.70); }
    .md-dot.amber { background: rgba(255,149,0,0.70); }
    .md-dot.green { background: rgba(52,199,89,0.70); }
    .md-sidebar-label { font-size: 11px; font-weight: 600; color: rgba(15,23,42,0.35); letter-spacing: 1px; text-transform: uppercase; }
    .md-metrics { display: flex; flex: 1; }
    .md-metric  { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #F1F5F9; padding: 12px 8px; }
    .md-metric:last-child { border-right: none; }
    .md-num     { font-size: 28px; font-weight: 800; color: #0F172A; letter-spacing: -1px; }
    .md-num.accent { color: #578BDE; }
    .md-lbl     { font-size: 11px; color: rgba(15,23,42,0.38); margin-top: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
    .md-chart   { flex: 0 0 160px; padding: 16px; display: flex; align-items: flex-end; gap: 7px; border-left: 1px solid #F1F5F9; }
    .db-bar     { flex: 1; border-radius: 3px 3px 0 0; background: rgba(255,50,49,0.18); }
    .db-bar.hi  { background: rgba(255,50,49,0.65); }

    /* Agent horizontal — light */
    .mockup-agent-h { background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(15,23,42,0.06); }
    .ma-header-h { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid #F1F5F9; }
    .ma-avatar-h { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, #2FB8C5, #578BDE); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .ma-title-h  { font-size: 13px; font-weight: 700; color: #64748B; }
    .ma-status-h { font-size: 11px; color: #2FB8C5; margin-left: auto; }
    .ma-messages { display: flex; align-items: flex-start; gap: 10px; padding: 14px 18px; overflow: hidden; }
    .ma-bubble   { border-radius: 12px; padding: 10px 14px; font-size: 13px; line-height: 1.40; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .ma-user { background: rgba(255,50,49,0.08); border: 1px solid rgba(255,50,49,0.15); color: #334155; }
    .ma-ai   { background: rgba(87,139,222,0.10); border: 1px solid rgba(87,139,222,0.20); color: #334155; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="grid"></div><div class="corner-accent"></div>
    <div class="circuit-tr"></div>
    <div class="header"><div class="etiqueta">{{etiqueta}}</div><div class="slide-num">{{slide_num}}</div></div>
    <div class="content">
      <div class="headline">{{headline_html}}</div>
      {{mockup_html}}
      {{analysis_html}}
      <div class="bullets">{{bullets_html}}</div>
    </div>
    <div class="footer">
      <div class="handle">@easywaychile</div>
      <div class="brand">Easyway Chile</div>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>
</body>
</html>
