<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #000000;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      background: #000000;
      font-family: 'Plus Jakarta Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Subtle glow behind number */
    .slide::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(255, 50, 49, 0.04) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Header */
    .header {
      position: absolute;
      top: 60px;
      left: 72px;
      right: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .etiqueta {
      font-size: 11px;
      font-weight: 700;
      color: #FF3231;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .slide-num {
      font-size: 13px;
      font-weight: 400;
      color: #2a2a2a;
      letter-spacing: 1px;
    }

    /* Content */
    .content {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 140px 72px;
    }

    .number {
      font-size: 160px;
      font-weight: 800;
      color: #ffffff;
      line-height: 0.85;
      letter-spacing: -8px;
      margin-bottom: 20px;
    }

    .label {
      font-size: 32px;
      font-weight: 600;
      color: #FF3231;
      letter-spacing: -0.5px;
      margin-bottom: 24px;
    }

    .context {
      font-size: 22px;
      font-weight: 400;
      color: #444444;
      line-height: 1.5;
      max-width: 700px;
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 52px;
      left: 72px;
      right: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid #111111;
      padding-top: 18px;
    }

    .handle {
      font-size: 13px;
      font-weight: 400;
      color: #2a2a2a;
    }

    .logo-img { height: 20px; width: auto; display: block; opacity: 0.35; }
    .logo-text { font-size: 13px; font-weight: 600; color: #2a2a2a; display: none; }
  </style>
</head>
<body>
  <div class="slide">

    <div class="header">
      <div class="etiqueta">DATO 2</div>
      <div class="slide-num">03</div>
    </div>

    <div class="content">
      <div class="number">+43%</div>
      <div class="label">Incremento promedio de productividad reportado</div>
      <div class="context">Promedio entre PyMEs sudamericanas con IA implementada</div>
    </div>

    <div class="footer">
      <div class="handle">@oscarvergara</div>
      <img class="logo-img" src="../../public/brand/logo.png" alt="CreActive Studio"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <div class="logo-text">CreActive Studio</div>
    </div>

  </div>
</body>
</html>
