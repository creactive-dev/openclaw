<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;600;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #2a9db5;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      /* Gradiente radial: cian claro arriba centro → cian más profundo en bordes */
      background: radial-gradient(ellipse at 50% 30%, rgba(57, 179, 197, 0.4) 0%, #39b3c5 100%);
      padding: 80px;
      display: flex;
      flex-direction: column;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Halo luminoso sutil en el centro superior */
    .slide::before {
      content: '';
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(255, 255, 255, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Top bar ──────────────────────────────────────── */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      margin-bottom: 40px;
      position: relative;
    }

    .slide-num {
      font-size: 15px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 1px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      padding: 4px 10px;
    }

    /* ── Contenido centrado ───────────────────────────── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 40px;
      position: relative;
    }

    .deco-dot {
      width: 14px;
      height: 14px;
      background: #ff3130;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(255, 49, 48, 0.5);
    }

    .headline {
      font-family: 'DM Serif Display', serif;
      font-size: 76px;
      font-weight: 400;
      color: #ffffff;
      line-height: 1.05;
      letter-spacing: -1.5px;
      max-width: 880px;
      text-shadow: 0 2px 40px rgba(0, 0, 0, 0.15);
    }

    .headline .accent { color: #0d0d0d; }

    .btn {
      display: inline-block;
      border: 2px solid rgba(255, 255, 255, 0.85);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 26px;
      font-weight: 700;
      padding: 22px 64px;
      border-radius: 50px;
      letter-spacing: -0.2px;
      background: rgba(255, 255, 255, 0.08);
    }

    .nota {
      font-size: 19px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.55);
      margin-top: -16px;
    }

    /* ── Engagement ───────────────────────────────────── */
    .engagement {
      border-top: 1px solid rgba(255, 255, 255, 0.25);
      padding-top: 28px;
      width: 100%;
      text-align: left;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      padding: 24px 28px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      margin-top: -8px;
    }

    .engagement p {
      font-size: 22px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.65);
      line-height: 2.1;
    }

    /* ── Footer ───────────────────────────────────────── */
    .footer {
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      padding-top: 28px;
      display: flex;
      align-items: center;
      position: relative;
    }

    .logo-img   { height: 30px; width: auto; display: block; filter: brightness(0) invert(1); opacity: 0.8; }
    .brand-text { font-size: 21px; font-weight: 400; color: rgba(255, 255, 255, 0.8); letter-spacing: -0.2px; display: none; }
  </style>
</head>
<body>
  <div class="slide">

    <div class="top-bar">
      <div class="slide-num">05</div>
    </div>

    <div class="content">
      <div class="deco-dot"></div>
      <div class="headline"><span class="accent">Tu agencia</span> también puede operar así.</div>
      <div class="btn">Hablemos esta semana</div>
      <div class="nota">Link en bio — primeras 3 sesiones con agenda abierta</div>
      <div class="engagement">
        <p>💾 Guarda este post si lo vas a aplicar</p>
        <p>♻️ Compártelo con alguien que lo necesite</p>
        <p>💬 Cuéntanos en comentarios: ¿ya usas IA en tu agencia?</p>
      </div>
    </div>

    <div class="footer">
      <img class="logo-img" src="../public/brand/creactive-logo.png" alt="CreActive Studio"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <div class="brand-text">CreActive Studio</div>
    </div>

  </div>
</body>
</html>
