<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #000000;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      background: #000000;
      font-family: 'Plus Jakarta Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Subtle red glow top-right */
    .slide::before {
      content: '';
      position: absolute;
      top: -120px;
      right: -120px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255, 50, 49, 0.06) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Header */
    .header {
      position: absolute;
      top: 60px;
      left: 72px;
      right: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .handle {
      font-size: 14px;
      font-weight: 600;
      color: #333333;
      letter-spacing: 0.5px;
    }

    .slide-num {
      font-size: 13px;
      font-weight: 400;
      color: #2a2a2a;
      letter-spacing: 1px;
    }

    /* Content */
    .content {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 140px 72px;
    }

    .etiqueta {
      display: inline-flex;
      align-self: flex-start;
      font-size: 11px;
      font-weight: 700;
      color: #FF3231;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .headline {
      font-size: 96px;
      font-weight: 800;
      color: #ffffff;
      line-height: 0.92;
      letter-spacing: -4px;
      margin-bottom: 40px;
    }

    .headline .accent { color: #FF3231; }

    .subheadline {
      font-size: 22px;
      font-weight: 400;
      color: #444444;
      line-height: 1.6;
      max-width: 780px;
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 52px;
      left: 72px;
      right: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-img { height: 24px; width: auto; display: block; opacity: 0.5; }
    .logo-text { font-size: 14px; font-weight: 600; color: #333333; display: none; }

    .red-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #FF3231;
    }
  </style>
</head>
<body>
  <div class="slide">

    <div class="header">
      <div class="handle">@oscarvergara</div>
      <div class="slide-num">01</div>
    </div>

    <div class="content">
      <div class="etiqueta">CASO REAL</div>
      <div class="headline">3 días para mandar un plan. Ahora: <span class="accent">4 minutos</span>.</div>
      <div class="subheadline">Esto es lo que instalamos en el negocio de Constanza Nutrición.</div>
    </div>

    <div class="footer">
      <img class="logo-img" src="../../public/brand/logo.png" alt="CreActive Studio"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <div class="logo-text">CreActive Studio</div>
      <div class="red-dot"></div>
    </div>

  </div>
</body>
</html>
