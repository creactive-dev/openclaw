<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1350px; overflow: hidden; background: #09080A; }
    .slide { width: 1080px; height: 1350px; background: #09080A; font-family: 'Plus Jakarta Sans', sans-serif; position: relative; overflow: hidden; }

    .glow-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 900px; height: 900px; background: radial-gradient(circle, rgba(255,50,49,0.10) 0%, rgba(120,30,80,0.06) 40%, transparent 70%); pointer-events: none; }
    .glow-top    { position: absolute; top: -80px; left: 50%; transform: translateX(-50%); width: 700px; height: 400px; background: radial-gradient(ellipse, rgba(255,50,49,0.08) 0%, transparent 70%); pointer-events: none; }

    /* Símbolo de cita — más visible */
    .quote-mark { position: absolute; top: 40px; left: 56px; font-family: 'DM Serif Display', serif; font-size: 340px; color: #FF3231; line-height: 0.8; opacity: 0.20; user-select: none; pointer-events: none; }

    /* Progress bar */
    .progress-bar  { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.06); z-index: 20; }
    .progress-fill { height: 100%; width: 83%; background: linear-gradient(90deg, #FF3231, rgba(255,50,49,0.4)); border-radius: 0 2px 2px 0; }

    /* Header */
    .header    { position: absolute; top: 52px; left: 68px; right: 68px; display: flex; justify-content: flex-end; z-index: 10; }
    .slide-num { font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.25); letter-spacing: 1.5px; }

    /* Content */
    .content { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; padding: 140px 76px 100px; z-index: 10; }
    .quote-card { border-left: 3px solid rgba(255,50,49,0.55); padding-left: 44px; margin-bottom: 64px; }
    .quote-text { font-family: 'DM Serif Display', serif; font-size: 58px; font-weight: 400; color: #ffffff; line-height: 1.12; letter-spacing: -1px; }
    .quote-text em     { font-style: italic; color: rgba(255,255,255,0.72); }
    .quote-text .accent { color: #FF3231; font-style: normal; }

    /* Author row — más grande */
    .author-row   { display: flex; align-items: center; gap: 24px; padding-left: 68px; }
    .author-photo { width: 80px; height: 80px; border-radius: 50%; overflow: hidden; border: 2px solid rgba(255,50,49,0.45); flex-shrink: 0; background: linear-gradient(135deg, rgba(255,50,49,0.3), rgba(0,180,216,0.2)); }
    .author-photo img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    .author-info  { display: flex; flex-direction: column; gap: 6px; }
    .author-name-row { display: flex; align-items: center; gap: 12px; }
    .author-name  { font-size: 24px; font-weight: 700; color: rgba(255,255,255,0.82); }
    .verified     { width: 24px; height: 24px; flex-shrink: 0; }
    .author-handle { font-size: 18px; font-weight: 400; color: rgba(255,255,255,0.45); letter-spacing: 0.2px; }

    /* Footer */
    .footer    { position: absolute; bottom: 44px; left: 68px; right: 68px; display: flex; align-items: center; justify-content: space-between; z-index: 10; }
    .handle    { font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.38); }
    .logo-img  { height: 20px; width: auto; display: block; opacity: 0.22; }
    .logo-text { font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.22); display: none; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="glow-center"></div><div class="glow-top"></div>
    <div class="quote-mark">"</div>
    <div class="header"><div class="slide-num">05</div></div>
    <div class="content">
      <div class="quote-card">
        <div class="quote-text">Es brillante... fumas tu <span class="accent">último cigarro</span> y ya está.</div>
      </div>
      <div class="author-row">
        <div class="author-photo">
          <img src="file:///Users/oz/Documents/CAS-CEO/creactive-studio/content-engine/carrusel/public/brand/easyway/headshot.jpg" alt="Claudia Sarmiento" onerror="this.style.display='none'">
        </div>
        <div class="author-info">
          <div class="author-name-row">
            <span class="author-name">Ashton Kutcher</span>
            <svg class="verified" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="11" cy="11" r="11" fill="#1D9BF0"/>
              <path d="M5.5 11.5L9 15L16.5 7.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="author-handle">@easywaychile · Easyway Chile</span>
        </div>
      </div>
    </div>
    <div class="footer">
      <div class="handle">@easywaychile</div>
      <img class="logo-img" src="../../public/brand/easyway/logo.png" alt="Easyway Chile" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <div class="logo-text">Easyway Chile</div>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>
</body>
</html>
