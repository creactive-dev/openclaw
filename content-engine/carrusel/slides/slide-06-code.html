<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #111111;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      background: #111111;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Cian glow top-right */
    .slide::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 460px;
      height: 460px;
      background: radial-gradient(circle, rgba(57, 179, 197, 0.10) 0%, transparent 65%);
      pointer-events: none;
    }

    /* ── Header ── */
    .header {
      position: absolute;
      top: 60px;
      left: 80px;
      right: 80px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .brand-asterisk {
      font-family: 'Inter', sans-serif;
      font-size: 52px;
      font-weight: 900;
      color: #ff3130;
      line-height: 1;
    }

    .slide-num {
      font-size: 14px;
      font-weight: 400;
      color: #3a3a3a;
      letter-spacing: 1px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 6px;
      padding: 4px 10px;
    }

    /* ── Content ── */
    .content {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 160px 80px;
    }

    .etiqueta {
      display: inline-flex;
      align-self: flex-start;
      font-size: 12px;
      font-weight: 700;
      color: #39b3c5;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: rgba(57, 179, 197, 0.10);
      border: 1px solid rgba(57, 179, 197, 0.30);
      border-radius: 4px;
      padding: 6px 14px;
      margin-bottom: 32px;
    }

    /* ── Code block ── */
    .code-block {
      background: #0a0a0a;
      border-radius: 18px;
      padding: 40px 44px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      margin-bottom: 40px;
      box-shadow:
        0 0 0 1px rgba(57, 179, 197, 0.06),
        0 20px 60px rgba(0, 0, 0, 0.7);
    }

    .code-dots {
      display: flex;
      gap: 9px;
      margin-bottom: 28px;
    }

    .code-dot { width: 13px; height: 13px; border-radius: 50%; }
    .code-dot.red    { background: #ff5f56; }
    .code-dot.yellow { background: #ffbd2e; }
    .code-dot.green  { background: #27c93f; }

    .code-block pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 25px;
      line-height: 2.0;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .code-comment { color: #3a3a3a; }
    .code-cmd     { color: #39b3c5; font-weight: 700; }
    .code-flag    { color: #588bdf; }
    .code-pkg     { color: #e8c97a; }
    .code-string  { color: #ff3130; }
    .code-repl    { color: #39b3c5; }
    .code-plain   { color: #aaaaaa; }

    /* ── Explanation ── */
    .explicacion {
      font-size: 30px;
      font-weight: 400;
      color: #ffffff;
      line-height: 1.6;
      opacity: 0.75;
    }

    /* ── Footer ── */
    .footer {
      position: absolute;
      bottom: 50px;
      left: 80px;
      right: 80px;
      display: flex;
      align-items: center;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      padding-top: 20px;
    }

    .logo-img   { height: 28px; width: auto; display: block; }
    .brand-text { font-size: 20px; font-weight: 400; color: #39b3c5; letter-spacing: -0.2px; display: none; }
  </style>
</head>
<body>
  <div class="slide">

    <div class="header">
      <div class="brand-asterisk">*</div>
      <div class="slide-num">06</div>
    </div>

    <div class="content">
      <div class="etiqueta">PASO 02 — PRIMER USO</div>
      <div class="code-block">
        <div class="code-dots">
          <div class="code-dot red"></div>
          <div class="code-dot yellow"></div>
          <div class="code-dot green"></div>
        </div>
        <pre><span class="code-comment"># Ve a la carpeta de tu proyecto</span>
<span class="code-cmd">cd</span> <span class="code-plain">mi-proyecto</span>
<span class="code-plain"> </span>
<span class="code-comment"># Inicia Claude Code</span>
<span class="code-cmd">claude</span>
<span class="code-plain"> </span>
<span class="code-comment"># Claude indexa todo automáticamente</span></pre>
      </div>
      <div class="explicacion">Claude lee tu proyecto completo y está listo para trabajar contigo en segundos.</div>
    </div>

    <div class="footer">
      <img class="logo-img" src="../public/brand/logo.png" alt="CreActive Studio"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <div class="brand-text">CreActive Studio</div>
    </div>

  </div>
</body>
</html>
